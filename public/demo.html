<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PyroPlan | Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bungee font -->
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    nav {
      width: 100%;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11,11,11,0.7);
    }

    .brand {
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.16);
      color: #fff;
      background: rgba(255,255,255,0.06);
      display: inline-block;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-primary {
      border: none;
      background: linear-gradient(90deg, #ff7a18, #af002d 70%);
    }

    .hero {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      width: min(1000px, 95vw);
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      padding: 50px 40px;
      text-align: center;
    }

    h1 {
      font-family: 'Bungee', cursive;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.2;
      letter-spacing: 1px;
      margin-bottom: 14px;

      background: linear-gradient(90deg, #ff7a18, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      opacity: 0.75;
      margin: 0 auto 26px;
      max-width: 720px;
      line-height: 1.5;
      font-size: 1.05rem;
    }

    .video-wrap {
      width: min(900px, 92vw);
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 22px 55px rgba(0,0,0,0.55);
      background: rgba(0,0,0,0.25);
    }

    video {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      padding: 18px;
      text-align: center;
      opacity: 0.6;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>

<body>

  <nav>
    <a class="brand" href="index.html">PYROPLAN</a>
    <div class="nav-actions">
      <a class="btn" href="simulation.html">Simulation</a>
      <a class="btn btn-primary" href="index.html">Home</a>
    </div>
  </nav>

  <main class="hero">
    <div class="card">
      <h1>Demo</h1>
      <p class="subtitle">
        Watch PyroPlan run a fire spread simulation and generate evacuation insights from a floor plan.
      </p>

      <div class="video-wrap">
        <video controls>
          <source src="demo.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>
    </div>
  </main>

  <footer>
    © 2026 PyroPlan — Hackathon Prototype
  </footer>

</body>
</html>
