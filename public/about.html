<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PyroPlan | Hackathon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bungee font -->
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    nav {
      width: 100%;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11,11,11,0.7);
    }

    .brand {
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
    }

    .nav-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    .btn {
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.16);
      color: #fff;
      background: rgba(255,255,255,0.06);
      display: inline-block;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-primary {
      border: none;
      background: linear-gradient(90deg, #ff7a18, #af002d 70%);
    }

    .hero {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 60px 20px;
    }

    .card {
      width: min(980px, 95vw);
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      align-items: center;
    }

    .logo {
      width: min(380px, 85%);
      height: auto;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.6));
      justify-self: center;
    }

    h1 {
      font-family: 'Bungee', cursive;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.2;
      letter-spacing: 1px;
      margin-bottom: 18px;

      background: linear-gradient(90deg, #ff7a18, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 1.1rem;
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 22px;
      max-width: 520px;
    }

    .cta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    footer {
      padding: 18px;
      text-align: center;
      opacity: 0.6;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    @media (max-width: 980px) {
      .card {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .subtitle { margin-left: auto; margin-right: auto; }
    }
  </style>
</head>

<body>

  <nav>
    <a class="brand" href="index.html">PYROPLAN</a>
    <div class="nav-actions">
      <a class="btn" href="about.html">About Us</a>
      <a class="btn" href="team.html">Team</a>
      <a class="btn btn-primary" href="demo.html">See Demo</a>
    </div>
  </nav>

  <main class="hero">
    <div class="card">
      <div>
        <h1>
          Plan faster. Respond smarter.<br>
          Stay ahead of the flame.
        </h1>

        <p class="subtitle">
          PyroPlan is a hackathon prototype designed to turn complex,
          fast-moving situations into clear, actionable decisions.
        </p>

        <div class="cta-row">
          <a class="btn btn-primary" href="simulation.html">Launch Prototype</a>
          <a class="btn" href="about.html">About Us</a>
          <a class="btn" href="team.html">Team</a>
        </div>
      </div>

      <div>
        <img class="logo" src="images/pyroplan_logo.png" alt="PyroPlan Logo">
      </div>
    </div>
  </main>

  <footer>
    © 2026 PyroPlan — Hackathon Prototype
  </footer>

</body>
</html>
