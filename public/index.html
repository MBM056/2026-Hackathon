<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PyroPlan | Hackathon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bungee font -->
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1a1a1a, #0b0b0b);
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    nav {
      width: 100%;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(11,11,11,0.7);
    }

    .brand {
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      color: #fff;
    }

    .nav-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.16);
      color: #fff;
      background: rgba(255,255,255,0.06);
      display: inline-block;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary {
      border: none;
      background: linear-gradient(90deg, #ff7a18, #af002d 70%);
    }

    .hero {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      width: min(900px, 95vw);
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
      padding: 60px 40px;
      text-align: center;
    }

    h1 {
      font-family: 'Bungee', cursive;
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 25px;
      background: linear-gradient(90deg, #ff7a18, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      opacity: 0.75;
      margin-bottom: 30px;
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }

    .logo {
      display: block;
      margin: 20px auto 30px;
      max-width: 500px;
      width: 100%;
    }

    .cta-center {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    footer {
      padding: 18px;
      text-align: center;
      opacity: 0.6;
      font-size: 0.9rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>

<body>

  <nav>
    <a class="brand" href="index.html">PYROPLAN</a>
    <div class="nav-actions">
      <a class="btn" href="team.html">Team</a>
      <a class="btn" href="demo.html">Demo</a>
      <a class="btn" href="legal.html">Legal</a>
      <a class="btn btn-primary" href="simulation.html">Simulation</a>
    </div>
  </nav>

  <main class="hero">
    <div class="card">
      <h1>Stay ahead of the flame.</h1>

      <p class="subtitle">
        PyroPlan transforms architectural floor plans into intelligent fire spread simulations and evacuation modeling.
      </p>

      <img class="logo" src="images/pyroplan_logo.png" alt="PyroPlan Logo">

 
    </div>
  </main>

  <footer>
    © 2026 PyroPlan — Hackathon Prototype
  </footer>

</body>
</html>
